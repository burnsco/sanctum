<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#1A2235"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="50%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#00F2FE"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="92" height="92" x="4" y="4" rx="20" fill="url(#bg)" filter="url(#shadow)"/>
  <rect width="90" height="90" x="5" y="5" rx="19" fill="none" stroke="#2A344A" stroke-width="2"/>
  
  <path d="M 70 26
           L 40 26
           A 12 12 0 0 0 28 38
           A 12 12 0 0 0 40 50
           L 60 50
           A 12 12 0 0 1 72 62
           A 12 12 0 0 1 60 74
           L 30 74" 
        fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
        
  <circle cx="20" cy="20" r="3" fill="#00F2FE" opacity="0.8" filter="url(#glow)"/>
  <circle cx="80" cy="80" r="3" fill="#4FACFE" opacity="0.8" filter="url(#glow)"/>
</svg>